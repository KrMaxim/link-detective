name: Build and Release v1.5

on:
  push:
    tags:
      - 'v*' # Запускается на любой тег, начинающийся с v

# Добавляем права на запись, чтобы исправить ошибку "Resource not accessible"
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false # Чтобы падение Mac не отменяло сборку Windows
      matrix:
        include:
          - os: windows-latest
            artifact_name: LinkDetective_v1.5_Win.exe
          - os: macos-latest
            artifact_name: LinkDetective_v1.5_Mac
    runs-on: ${{ matrix.os }}
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Убираем предупреждения Node.js

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 requests pandas beautifulsoup4 pyinstaller lxml openpyxl

    - name: Build Application
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          python -m PyInstaller --noconsole --onefile --name "LinkDetective_v1.5_Win" link_detective.py
        else
          python -m PyInstaller --noconsole --windowed --onefile --name "LinkDetective_v1.5_Mac" link_detective.py
          # Архивируем .app для Mac, чтобы сохранить права доступа
          cd dist && zip -r ../LinkDetective_v1.5_Mac.zip LinkDetective_v1.5_Mac.app && cd ..
        fi
      shell: bash

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/LinkDetective_v1.5_Win.exe
          LinkDetective_v1.5_Mac.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}